<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Statistics</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f5f5f5;
            color: #333;
        }
        h1 {
            border-bottom: 2px solid #4a90e2;
            padding-bottom: 10px;
            color: #4a90e2;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        th {
            background: #4a90e2;
            color: white;
            padding: 12px 16px;
            text-align: left;
        }
        td {
            padding: 12px 16px;
            border-bottom: 1px solid #eee;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover td {
            background: #f0f7ff;
        }
        .total-box {
            margin-top: 24px;
            background: white;
            border-radius: 8px;
            padding: 16px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            font-size: 18px;
        }
        .total-box span {
            font-weight: bold;
            color: #4a90e2;
            font-size: 24px;
        }
        a {
            display: inline-block;
            margin-top: 24px;
            color: #4a90e2;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Employee Statistics</h1>

    <h2>By Department</h2>
    <table>
        <thead>
            <tr>
                <th>Department</th>
                <th>Employee Count</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="stat : ${stats}">
                <td th:text="${stat.departmentName}"></td>
                <td th:text="${stat.employeeCount}"></td>
            </tr>
        </tbody>
    </table>

    <div class="total-box">
        Total Employees: <span th:text="${total}"></span>
    </div>

    <a href="/employees/list">← Back to List</a>
</body>
</html>
